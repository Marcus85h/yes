name: video_dating_app
description: A video dating application with real-time chat and video calling features.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI 框架和组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # 状态管理
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # 路由和导航
  go_router: ^12.1.3
  auto_route: ^7.8.4

  # 网络和API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 实时通信
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.3+1

  # 视频通话
  webrtc_interface: ^1.1.1
  flutter_webrtc: ^0.9.47

  # 权限和系统服务
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.1
  package_info_plus: ^4.2.0

  # 媒体和文件
  image_picker: ^1.0.4
  video_player: ^2.8.1
  camera: ^0.10.5+5
  gallery_saver: ^2.3.2

  # 通知
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # 支付
  stripe_platform_interface: ^8.0.0
  flutter_stripe: ^10.0.0

  # 地图和位置
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0

  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  easy_localization: ^3.0.3

  # 安全和加密
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # 工具库
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.2

  # 调试和开发
  flutter_secure_storage: ^9.0.0
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^7.0.8
  auto_route_generator: ^7.3.2

  # 代码质量
  flutter_lints: ^3.0.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.9

  # 测试
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300 